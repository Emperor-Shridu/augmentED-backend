services:
  - type: web
    name: augmented-backend
    env: python
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: ADMIN_PASSWORD
        value: admin123
